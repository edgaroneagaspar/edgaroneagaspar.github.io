    <text x="737" y="229" font-size="88">?</text>
    <text x="420" y="472" font-size="72">λ</text>
    <text x="190" y="705" font-size="62">∃</text>
    <text x="686" y="739" font-size="58">∀</text>
  </g>
  <g filter="url(#softShadow)">
