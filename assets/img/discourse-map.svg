<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" role="img" aria-labelledby="title desc">
  <title id="title">Abstract discourse map</title>
  <desc id="desc">An abstract network of questions, alternatives and discourse paths.</desc>
  <defs>
    <radialGradient id="bg" cx="24%" cy="10%" r="90%">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="52%" stop-color="#eadbd4"/>
      <stop offset="100%" stop-color="#d8e2df"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#211711" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="900" height="900" fill="url(#bg)"/>
  <g opacity="0.78" stroke="#1e5e63" stroke-width="4" fill="none">
    <path d="M142 612 C 220 514, 271 442, 386 442 S 561 358, 744 254"/>
