    <circle cx="386" cy="442" r="38" fill="#fffaf3" stroke="#171412" stroke-width="3"/>
    <circle cx="744" cy="254" r="31" fill="#1e5e63"/>
    <circle cx="141" cy="279" r="23" fill="#fffaf3" stroke="#8b2f24" stroke-width="3"/>
    <circle cx="455" cy="330" r="26" fill="#fffaf3" stroke="#1e5e63" stroke-width="3"/>
    <circle cx="777" cy="154" r="18" fill="#8b2f24"/>
    <circle cx="203" cy="711" r="25" fill="#1e5e63"/>
    <circle cx="487" cy="611" r="33" fill="#fffaf3" stroke="#171412" stroke-width="3"/>
    <circle cx="772" cy="552" r="21" fill="#8b2f24"/>
    <circle cx="231" cy="187" r="21" fill="#1e5e63"/>
    <circle cx="672" cy="738" r="29" fill="#fffaf3" stroke="#8b2f24" stroke-width="3"/>
